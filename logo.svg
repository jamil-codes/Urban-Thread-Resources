<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: 2px; }
    .sub { font-family: Arial, Helvetica, sans-serif; font-weight: 600; letter-spacing: 4px; }
  </style>

  <!-- URBAN -->
  <text x="50%" y="100" text-anchor="middle" class="title" font-size="72" fill="#111">
    URBAN
  </text>

  <!-- THREAD -->
  <text x="50%" y="180" text-anchor="middle" class="title" font-size="72" fill="#111">
    THREAD
  </text>

  <!-- Needle -->
  <line x1="330" y1="110" x2="310" y2="230" stroke="#111" stroke-width="4"/>
  <circle cx="330" cy="110" r="6" fill="#111"/>

  <!-- Thread curve -->
  <path d="M310 230 Q380 250 450 220" stroke="#111" stroke-width="2" fill="none"/>

  <!-- CO -->
  <text x="50%" y="260" text-anchor="middle" class="sub" font-size="28" fill="#111">
    CO.
  </text>

  <!-- Lines -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#111" stroke-width="2"/>
  <line x1="350" y1="250" x2="450" y2="250" stroke="#111" stroke-width="2"/>
</svg>
